name: Deploy Admin

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install ADMIN dependencies
        run: |
          cd ADMIN
          npm install

      - name: Build ADMIN
        run: |
          cd ADMIN
          npm run build

     - name: Upload build to VM
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "ADMIN/.next,ADMIN/public,ADMIN/package.json,ADMIN/package-lock.json"
          target: "/var/www/admin/ADMIN"
          strip_components: 1

      - name: Restart on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /var/www/admin/ADMIN
            npm install --production
            pm2 restart admin || pm2 start npm --name "admin" -- start
            pm2 save
            echo "✅ Admin deployed!"